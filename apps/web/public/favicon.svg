<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fondo oscuro KOAJ con esquinas redondeadas -->
  <rect width="64" height="64" rx="14" fill="#111827"/>

  <!-- Barra vertical de la K -->
  <rect x="9" y="13" width="7" height="38" rx="3.5" fill="#4f46e5"/>

  <!-- Brazo superior de la K -->
  <path d="M16 32 L37 14" stroke="#4f46e5" stroke-width="7" stroke-linecap="round"/>

  <!-- Brazo inferior de la K (termina en punta de flecha de devolución) -->
  <!-- La pata baja de la K se convierte en flecha hacia arriba-izquierda -->
  <path d="M16 32 L37 50" stroke="#4f46e5" stroke-width="7" stroke-linecap="round"/>

  <!-- Flecha circular de devolución — arco blanco en la esquina superior derecha -->
  <!-- Arco que va de las 12 en punto hasta las 4, en sentido antihorario -->
  <path
    d="M44 14
       A12 12 0 0 0 56 34"
    stroke="white"
    stroke-width="4.5"
    stroke-linecap="round"
    fill="none"
  />
  <!-- Punta de la flecha apuntando hacia abajo-izquierda -->
  <polyline
    points="50,30 56,34 56,41"
    stroke="white"
    stroke-width="4.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Punto de acento morado claro (detalle visual) -->
  <circle cx="44" cy="14" r="3" fill="#7c6bea"/>
</svg>
